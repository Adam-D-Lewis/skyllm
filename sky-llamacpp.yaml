name: llm

# Alternative engine preset: llama.cpp + llama-server (GGUF models).
# Same shape as sky.yaml (vLLM is default) but uses the conda-forge
# `llama.cpp` package (cuda129 build) installed via pixi. Gives you native
# GGUF support, --metrics Prometheus endpoint, and parity with the owner's
# local `llama-router` config.
#
# Usage:
#   YAML=sky-llamacpp.yaml make up
#
# Cold-start time: ~1–2 min (pixi install of a prebuilt binary). The old
# source-build path was ~10–15 min — conda-forge adding a linux-64 CUDA
# variant of llama.cpp let us delete it. See docs/pixi.md.

envs:
  LLM_HOSTNAME: ""
  CF_TUNNEL_TOKEN: ""
  LLM_API_KEY: ""
  # llama.cpp loads GGUF files — set both the HF repo and the file name.
  # Default is a tiny Qwen2.5-0.5B Q4_K_M — parallel to sky.yaml's vLLM
  # default, fast stack-test model. The earlier `ggml-org/SmolLM2-*-GGUF`
  # default stopped being publicly downloadable in 2026.
  LLM_HF_REPO: Qwen/Qwen2.5-0.5B-Instruct-GGUF
  LLM_HF_FILE: qwen2.5-0.5b-instruct-q4_k_m.gguf
  HF_TOKEN: ""
  IDLE_MINUTES: "15"
  MAX_RUNTIME_MINUTES: "240"
  # idle-watch.sh reads this to know which Prometheus counter to poll.
  IDLE_METRIC: "llamacpp:n_tokens_predicted_total"

resources:
  cloud: runpod
  # No image_id — default runpod/base has sshd. vllm/ggml app images don't,
  # so we can't pin to them on RunPod (pods are containers, not VMs).
  accelerators: {RTX4090:1, RTX3090:1, RTXA5000:1, RTXA6000:1, L40S:1}
  memory: 16+
  disk_size: 32
  ports: 8080

workdir: .

setup: |
  set -e
  # Install pixi + the llamacpp env from the committed pixi.toml/lock.
  # conda-forge's `llama.cpp=*=cuda129*` ships a prebuilt binary with CUDA
  # runtime bundled; works on driver 570+ (empirically verified on RunPod).
  if ! command -v pixi >/dev/null 2>&1 && [ ! -x "$HOME/.pixi/bin/pixi" ]; then
    curl -fsSL https://pixi.sh/install.sh | bash
  fi
  export PATH="$HOME/.pixi/bin:$PATH"
  pixi install -e llamacpp

  # cloudflared is a single static Go binary
  if ! command -v cloudflared >/dev/null; then
    sudo curl -fL -o /usr/local/bin/cloudflared \
      https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
    sudo chmod +x /usr/local/bin/cloudflared
  fi

run: |
  set -e

  sudo shutdown -h +${MAX_RUNTIME_MINUTES} "skypilot-llms wall-clock cap" 2>/dev/null &

  : "${LLM_HOSTNAME:?LLM_HOSTNAME is required — set it in .env}"
  : "${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required — set it in .env}"
  : "${LLM_API_KEY:?LLM_API_KEY is required — set it in .env}"

  mkdir -p ~/.skypilot-llms-logs
  export PATH="$HOME/.pixi/bin:$PATH"

  # Direct env-binary invoke + LD_PRELOAD env's libstdc++ — see docs/pixi.md.
  # llama-server is a C++ binary (not python) so the libstdc++ pin issue is
  # less likely to apply, but keeping it for consistency — cheap insurance.
  LLAMA_ENV="$HOME/sky_workdir/.pixi/envs/llamacpp"
  pkill -f 'llama-server' 2>/dev/null || true
  LD_PRELOAD="$LLAMA_ENV/lib/libstdc++.so.6" nohup "$LLAMA_ENV/bin/llama-server" \
    --hf-repo "${LLM_HF_REPO}" \
    --hf-file "${LLM_HF_FILE}" \
    --api-key "${LLM_API_KEY}" \
    --host 0.0.0.0 --port 8080 \
    --metrics \
    -ngl 99 \
    > ~/.skypilot-llms-logs/llama-server.log 2>&1 &

  echo "Waiting for llama-server to become healthy..."
  for i in $(seq 1 240); do
    if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
      echo "llama-server is ready"
      break
    fi
    sleep 5
  done

  pkill -f 'cloudflared' 2>/dev/null || true
  nohup cloudflared tunnel --no-autoupdate run --token "${CF_TUNNEL_TOKEN}" \
    > ~/.skypilot-llms-logs/cloudflared.log 2>&1 &

  echo "Tunnel up: https://${LLM_HOSTNAME}/v1"

  bash scripts/idle-watch.sh
