[workspace]
name = "skyllm"
channels = ["conda-forge"]
platforms = ["linux-64"]
version = "0.1.0"

# Local-only workspace for the `skyllm` CLI and the catalog schema validator.
# No CUDA here — developers can install this on a laptop without pulling any
# GPU-side wheels. The pod's engine envs (vllm, llamacpp) live under pod/
# and are intentionally isolated so nothing in this file rides up to RunPod.

[dependencies]
python = "3.12.*"
pydantic = ">=2"
pyyaml = "*"
typer = "*"
requests = "*"

# Editable install of the repo's own package — provides the `skyllm`
# entry point (see [project.scripts] in pyproject.toml).
[pypi-dependencies]
skyllm = { path = ".", editable = true }

[tasks]
validate = "python -m skyllm.validate"
