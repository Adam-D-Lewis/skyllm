name: llm-big

# "Big" preset: 48–80 GB single-GPU tier for models that don't fit on a 24 GB
# card. Same stack as sky.yaml (vLLM + cloudflared), different GPU class and a
# shorter wall-clock default because hourly cost is several × higher.
#
# Usage:
#   YAML=sky-big.yaml make up
#
# Before launching, point LLM_MODEL in .env at a model that actually needs
# this tier — default is still a 0.5B model, which will run fine but waste
# the hardware.

envs:
  LLM_HOSTNAME: ""
  CF_TUNNEL_TOKEN: ""
  LLM_API_KEY: ""
  LLM_MODEL: Qwen/Qwen2.5-0.5B-Instruct
  HF_TOKEN: ""
  IDLE_MINUTES: "15"
  # Shorter than sky.yaml's 240 min default — at A100/H100 rates ($1.20–4.50/hr)
  # an overnight wedge is a $50+ mistake. Override in .env if you need longer.
  MAX_RUNTIME_MINUTES: "60"

resources:
  cloud: runpod
  # No image_id — see sky.yaml for why (vllm/vllm-openai lacks sshd, fails on
  # RunPod). Default runpod/base has sshd; we pip install vllm in setup.
  # 48–80 GB tier. SkyPilot picks the cheapest available at launch.
  accelerators: {A6000:1, L40S:1, A100-80GB:1, A100:1, H100:1}
  memory: 16+
  # Bigger disk for bigger models — 70B FP8 is ~40 GB, 120B FP8 is ~70 GB.
  disk_size: 150
  ports: 8080

workdir: .

setup: |
  set -e
  # Install pixi + the vllm env from the committed pixi.toml/lock.
  # Same shape as sky.yaml — see docs/pixi.md for the reasoning.
  if ! command -v pixi >/dev/null 2>&1 && [ ! -x "$HOME/.pixi/bin/pixi" ]; then
    curl -fsSL https://pixi.sh/install.sh | bash
  fi
  export PATH="$HOME/.pixi/bin:$PATH"
  pixi install -e vllm

  if ! command -v cloudflared >/dev/null; then
    curl -fL -o /usr/local/bin/cloudflared \
      https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
    chmod +x /usr/local/bin/cloudflared
  fi

run: |
  set -e

  shutdown -h +${MAX_RUNTIME_MINUTES} "skypilot-llms wall-clock cap" 2>/dev/null &

  : "${LLM_HOSTNAME:?LLM_HOSTNAME is required — set it in .env}"
  : "${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required — set it in .env}"
  : "${LLM_API_KEY:?LLM_API_KEY is required — set it in .env}"

  mkdir -p ~/.skypilot-llms-logs
  export PATH="$HOME/.pixi/bin:$PATH"

  # Direct env-python invoke + LD_PRELOAD env's libstdc++ — see docs/pixi.md.
  VLLM_ENV="$HOME/sky_workdir/.pixi/envs/vllm"
  pkill -f 'vllm.entrypoints' 2>/dev/null || true
  LD_PRELOAD="$VLLM_ENV/lib/libstdc++.so.6" nohup "$VLLM_ENV/bin/python" \
    -m vllm.entrypoints.openai.api_server \
    --model "${LLM_MODEL}" \
    --api-key "${LLM_API_KEY}" \
    --host 0.0.0.0 --port 8080 \
    > ~/.skypilot-llms-logs/vllm.log 2>&1 &

  # Big models take longer to download + load — wait up to 20 minutes.
  echo "Waiting for vLLM to become healthy..."
  for i in $(seq 1 240); do
    if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
      echo "vLLM is ready"
      break
    fi
    sleep 5
  done

  pkill -f 'cloudflared' 2>/dev/null || true
  nohup cloudflared tunnel --no-autoupdate run --token "${CF_TUNNEL_TOKEN}" \
    > ~/.skypilot-llms-logs/cloudflared.log 2>&1 &

  echo "Tunnel up: https://${LLM_HOSTNAME}/v1"

  bash scripts/idle-watch.sh
