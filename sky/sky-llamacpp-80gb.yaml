name: llm-80gb

# llama.cpp pure-GPU preset: 80 GB single card for large GGUFs that fit
# entirely in VRAM. Contrast with sky/sky-llamacpp-cpumoe.yaml, which targets
# the same class of models on a 24 GB card via CPU-offloaded experts.
#
# Not launched directly — `skyllm up <model>` picks this preset when the
# catalog entry has `engine: llamacpp` and `tier: 80gb`. The `LLM_HF_REPO`
# / `LLM_HF_FILE` defaults are stack-test fallbacks; the CLI overrides them
# from the catalog's `hf_repo` / `hf_file`.
#
# Uses `hf download --format quiet` to pre-fetch the GGUF, then passes
# `-m <path>` to llama-server instead of --hf-repo/--hf-file. Same reason
# as sky-llamacpp-cpumoe.yaml: llama.cpp b8722's built-in downloader hangs
# on multi-GB files served via HuggingFace's Xet storage (issue
# ggml-org/llama.cpp#21280).

envs:
  LLM_HOSTNAME: ""
  CF_TUNNEL_TOKEN: ""
  LLM_API_KEY: ""
  # Stack-test defaults — overridden by the CLI from the catalog.
  LLM_HF_REPO: Qwen/Qwen2.5-0.5B-Instruct-GGUF
  LLM_HF_FILE: qwen2.5-0.5b-instruct-q4_k_m.gguf
  HF_TOKEN: ""
  IDLE_MINUTES: "15"
  # Short cap — 80 GB cards are several × more expensive than the 24 GB
  # tier. Override in .env if you need a longer session.
  MAX_RUNTIME_MINUTES: "60"
  IDLE_METRIC: "llamacpp:n_tokens_predicted_total"

resources:
  cloud: runpod
  # 80 GB cards only. A 48 GB MXFP4 model doesn't fit on 48 GB cards
  # (A6000/L40S) after KV cache; those belong in the cpumoe preset.
  # SkyPilot picks cheapest available — usually A100-80GB over H100.
  accelerators: {A100-80GB:1, H100:1}
  # Big disk for big GGUFs + HF cache staging.
  disk_size: 128
  ports: 8080

# See sky/sky.yaml for why this is an explicit allowlist instead of
# `workdir: .` (secret-leak safety via minimal upload surface).
file_mounts:
  ~/sky_workdir/pixi.toml: pod/pixi.toml
  ~/sky_workdir/pixi.lock: pod/pixi.lock
  ~/sky_workdir/scripts/idle-watch.sh: scripts/idle-watch.sh

setup: |
  set -e
  if ! command -v pixi >/dev/null 2>&1 && [ ! -x "$HOME/.pixi/bin/pixi" ]; then
    curl -fsSL https://pixi.sh/install.sh | bash
  fi
  export PATH="$HOME/.pixi/bin:$PATH"
  pixi install -e llamacpp

  if ! command -v cloudflared >/dev/null; then
    sudo curl -fL -o /usr/local/bin/cloudflared \
      https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
    sudo chmod +x /usr/local/bin/cloudflared
  fi

run: |
  set -e

  sudo shutdown -h +${MAX_RUNTIME_MINUTES} "skypilot-llms wall-clock cap" 2>/dev/null &

  : "${LLM_HOSTNAME:?LLM_HOSTNAME is required — set it in .env}"
  : "${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required — set it in .env}"
  : "${LLM_API_KEY:?LLM_API_KEY is required — set it in .env}"

  mkdir -p ~/.skypilot-llms-logs
  export PATH="$HOME/.pixi/bin:$PATH"

  LLAMA_ENV="$HOME/sky_workdir/.pixi/envs/llamacpp"

  # Pre-download via `hf`; see sky/sky-llamacpp-cpumoe.yaml top comment.
  echo "Downloading ${LLM_HF_FILE} from ${LLM_HF_REPO}..."
  MODEL_PATH=$("$LLAMA_ENV/bin/hf" download \
    --format quiet \
    --type model \
    "${LLM_HF_REPO}" "${LLM_HF_FILE}")
  echo "Model cached at: ${MODEL_PATH}"

  # Pure-GPU: all layers offloaded (-ngl 99), no --n-cpu-moe. q8_0 KV
  # cache still halves memory vs f16 — lets the 131k context fit alongside
  # the 48 GB weights on an 80 GB card.
  pkill -f 'llama-server' 2>/dev/null || true
  LD_PRELOAD="$LLAMA_ENV/lib/libstdc++.so.6" nohup "$LLAMA_ENV/bin/llama-server" \
    -m "${MODEL_PATH}" \
    --api-key "${LLM_API_KEY}" \
    --host 0.0.0.0 --port 8080 \
    --metrics \
    -ngl 99 \
    --ctx-size 131072 \
    --cache-type-k q8_0 \
    --cache-type-v q8_0 \
    > ~/.skypilot-llms-logs/llama-server.log 2>&1 &

  echo "Waiting for llama-server to become healthy..."
  for i in $(seq 1 240); do
    if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
      echo "llama-server is ready"
      break
    fi
    sleep 5
  done

  pkill -f 'cloudflared' 2>/dev/null || true
  nohup cloudflared tunnel --no-autoupdate run --token "${CF_TUNNEL_TOKEN}" \
    > ~/.skypilot-llms-logs/cloudflared.log 2>&1 &

  echo "Tunnel up: https://${LLM_HOSTNAME}/v1"

  bash scripts/idle-watch.sh
