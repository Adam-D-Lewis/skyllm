# Full SkyPilot YAML schema reference:
#   https://docs.skypilot.co/en/latest/reference/yaml-spec.html
# Top-level keys used below: name, envs, resources, workdir, setup, run.

# Task name — shown in `sky status`, `sky logs`, etc. Also the default cluster
# name if you don't pass `-c <name>` to `sky launch`.
name: llm

# Environment variables exposed to `setup:` and `run:` on the cluster. Keys
# listed here with `""` are *required at launch time* — SkyPilot errors out if
# they're still empty. Non-empty values act as defaults.
# All user-specific values come from .env (via `--env-file .env` on launch,
# which `skyllm up` does for you). Model-identity vars (LLM_MODEL /
# LLM_HF_REPO / LLM_HF_FILE) come from the catalog, not .env — the CLI
# injects them as `--env KEY=VAL`. See .env.example for the non-model values.
envs:
  LLM_HOSTNAME: ""
  CF_TUNNEL_TOKEN: ""
  LLM_API_KEY: ""
  # HuggingFace repo ID of the model vLLM should load. Default is tiny so the
  # stack gets tested in seconds.
  LLM_MODEL: Qwen/Qwen2.5-0.5B-Instruct
  HF_TOKEN: ""
  IDLE_MINUTES: "15"
  MAX_RUNTIME_MINUTES: "240"

# Hardware + infra spec for each node. SkyPilot uses this to pick a VM/pod
# across the enabled clouds. Common sub-keys: cloud, region, accelerators,
# cpus, memory, disk_size, image_id, ports, use_spot.
resources:
  cloud: runpod
  # No image_id — we let SkyPilot use the provider's default (on RunPod:
  # runpod/base:1.0.2-ubuntu2204), which ships sshd. Trying to pin to
  # vllm/vllm-openai directly fails on RunPod because that image doesn't run
  # sshd and RunPod pods *are* containers, so SkyPilot can't bootstrap in.
  # This matches SkyPilot's canonical Llama-3 example pattern.
  # RunPod-available 24 GB GPUs. SkyPilot picks the cheapest available.
  accelerators: {RTX4090:1, RTX3090:1, RTXA5000:1, RTXA6000:1, L40S:1}
  memory: 16+
  disk_size: 48
  ports: 8080

# Explicit allowlist of files uploaded to ~/sky_workdir on the pod. We
# deliberately DO NOT use `workdir: .` — that would rsync the whole repo and
# anything we forgot to .gitignore (stray secrets, scratch files, the .env
# the CLI reads locally) would ride up with it. Only these three files are
# actually referenced by `setup:` / `run:` below; keeping the upload surface
# minimal makes accidental leakage impossible.
file_mounts:
  ~/sky_workdir/pixi.toml: pod/pixi.toml
  ~/sky_workdir/pixi.lock: pod/pixi.lock
  ~/sky_workdir/scripts/idle-watch.sh: scripts/idle-watch.sh

# Runs once per cluster provision (or after `sky launch` with code changes).
# Use it for installs and anything idempotent. Failures here abort the launch.
setup: |
  set -e
  # Install pixi (single static Rust binary, ~30 MB, unprivileged install).
  if ! command -v pixi >/dev/null 2>&1 && [ ! -x "$HOME/.pixi/bin/pixi" ]; then
    curl -fsSL https://pixi.sh/install.sh | bash
  fi
  export PATH="$HOME/.pixi/bin:$PATH"

  # Resolve + install the `vllm` environment from the committed pixi.toml /
  # pixi.lock. vllm's pypi wheel pulls torch==2.10.0+cu128 as a transitive;
  # pypi's torch is CUDA-enabled. cuda-toolkit from conda-forge provides
  # CUDA_HOME so any sdist fallback succeeds. See docs/pixi.md for why this
  # specific shape — we hit several dead ends before landing here.
  pixi install -e vllm

  # cloudflared is a single static Go binary
  if ! command -v cloudflared >/dev/null; then
    curl -fL -o /usr/local/bin/cloudflared \
      https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
    chmod +x /usr/local/bin/cloudflared
  fi

# The main workload. Runs every time the task starts (launch, restart, or
# `sky exec`). When this script exits, the SkyPilot job ends — which is why
# we block on the idle-watcher at the bottom.
run: |
  set -e

  # Wall-clock safety net: force shutdown after MAX_RUNTIME_MINUTES no matter
  # what. Protects against a wedged idle-watcher leaving the GPU running
  # overnight.
  shutdown -h +${MAX_RUNTIME_MINUTES} "skypilot-llms wall-clock cap" 2>/dev/null &

  # Fail fast on missing required config
  : "${LLM_HOSTNAME:?LLM_HOSTNAME is required — set it in .env}"
  : "${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required — set it in .env}"
  : "${LLM_API_KEY:?LLM_API_KEY is required — set it in .env}"

  mkdir -p ~/.skypilot-llms-logs
  export PATH="$HOME/.pixi/bin:$PATH"

  # Start vLLM OpenAI-compatible server. --api-key enforces
  # `Authorization: Bearer <key>` on every request. HF_TOKEN is read from the
  # env for gated models.
  # Two non-obvious bits (see docs/pixi.md for the full story):
  #  1. Invoke the env's python directly; `pixi run` doesn't set
  #     LD_LIBRARY_PATH and some RunPod pods load system libstdc++ first.
  #  2. LD_PRELOAD the env's libstdc++.so.6 so any C extension imported
  #     before _sqlite3 (e.g. torch, xgrammar) doesn't pin the older
  #     system libstdc++ — which would then break libicui18n's need for
  #     CXXABI_1.3.15 when sqlite3 loads.
  VLLM_ENV="$HOME/sky_workdir/.pixi/envs/vllm"
  pkill -f 'vllm.entrypoints' 2>/dev/null || true
  LD_PRELOAD="$VLLM_ENV/lib/libstdc++.so.6" nohup "$VLLM_ENV/bin/python" \
    -m vllm.entrypoints.openai.api_server \
    --model "${LLM_MODEL}" \
    --api-key "${LLM_API_KEY}" \
    --host 0.0.0.0 --port 8080 \
    > ~/.skypilot-llms-logs/vllm.log 2>&1 &

  # Wait for vLLM to be ready. Model download + CUDA init can take minutes.
  echo "Waiting for vLLM to become healthy..."
  for i in $(seq 1 240); do
    if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
      echo "vLLM is ready"
      break
    fi
    sleep 5
  done

  # Cloudflare Tunnel
  pkill -f 'cloudflared' 2>/dev/null || true
  nohup cloudflared tunnel --no-autoupdate run --token "${CF_TUNNEL_TOKEN}" \
    > ~/.skypilot-llms-logs/cloudflared.log 2>&1 &

  echo "Tunnel up: https://${LLM_HOSTNAME}/v1"
  echo "Test:  curl https://${LLM_HOSTNAME}/v1/models -H 'Authorization: Bearer \$LLM_API_KEY'"

  # Block on the idle-watcher — when it exits, the SkyPilot job finishes and
  # --idle-minutes-to-autostop + --down will terminate the cluster.
  bash scripts/idle-watch.sh
