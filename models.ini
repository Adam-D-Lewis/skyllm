; Reference model presets for llama.cpp's router mode (--models-preset).
; NOT wired into sky.yaml v1 — v1 runs a single model via LLM_HF_REPO /
; LLM_HF_FILE in .env. This file is scaffolding for v1.5 when you want to
; hot-swap between multiple models on one rented GPU (same pattern as
; ~/CodingProjects/llama-router).
;
; To enable router mode, change sky.yaml's llama-server invocation from
;   --hf-repo ... --hf-file ...
; to
;   --models-preset /workspace/models.ini
; and mount this file into the container. Requires a llama.cpp build with
; router mode support (ggml-org's :server-cuda image is current enough).

[SmolLM2-360M]
hf-repo      = ggml-org/SmolLM2-360M-Instruct-GGUF
hf-file      = SmolLM2-360M-Instruct-Q8_0.gguf
alias        = SmolLM2-360M
ctx-size     = 8192
n-gpu-layers = 99

[Llama-3.2-1B]
hf-repo      = ggml-org/Llama-3.2-1B-Instruct-GGUF
hf-file      = Llama-3.2-1B-Instruct-Q8_0.gguf
alias        = Llama-3.2-1B
ctx-size     = 32768
n-gpu-layers = 99

[Qwen3.6-35B-A3B]
; MoE — aggressive CPU offload not needed on a 24 GB GPU; tune n-cpu-moe per card.
hf-repo                   = unsloth/Qwen3.6-35B-A3B-GGUF
hf-file                   = Qwen3.6-35B-A3B-MXFP4_MOE.gguf
alias                     = Qwen3.6-35B-A3B
ctx-size                  = 131072
n-gpu-layers              = 99
cache-type-k              = q8_0
cache-type-v              = q8_0
batch-size                = 4096
ubatch-size               = 2048
checkpoint-every-n-tokens = 1024
