hf_repo: unsloth/Qwen3-Coder-Next-GGUF
hf_file: Qwen3-Coder-Next-MXFP4_MOE.gguf
engine: llamacpp
tier: 24gb-cpumoe
min_disk_gb: 128
extra_args: []
notes: |
  80B-total / 3B-active MoE. MXFP4 MoE quant: ~48 GB on disk.

  Deployed with CPU offload on a 24 GB card (3090/4090/A5000/A6000/L40S) +
  ~96 GB system RAM. `sky/sky-llamacpp-cpumoe.yaml` runs llama-server with
  `--n-cpu-moe 48 --ctx-size 131072 --cache-type-k q8_0 --cache-type-v q8_0`,
  matching the owner's local llama-router config for this model. Expert
  weights sit in RAM; only active/dense tensors transit the GPU.

  Pure-GPU variant available on an 80 GB card (A100-80GB/H100) — see the
  sibling entry `qwen3-coder-next-80gb` (tier: 80gb,
  sky/sky-llamacpp-80gb.yaml). Not the default because 80 GB cards are
  availability-constrained and several × more expensive per hour.

  Engine is llama.cpp because the MXFP4 weights ship as GGUF and vLLM's
  GGUF support is still experimental.

  Benchmark (2026-04-24, RunPod `1x_L40S_SECURE`, $0.86/hr, 62 GB RAM, only
  7.65 effective vCPUs after container cgroup quota):
  - Prompt eval: ~0.68 tok/s
  - Generation:  ~0.59 tok/s
  - ~170× slower than the 80gb pure-GPU variant. Memory-bandwidth × core-
    count is the bottleneck — token generation waits on MoE expert weights
    paging through a thin CPU slice. The preset now filters `cpus: 16+` to
    skip the smallest RunPod SKUs next time; not yet re-measured.
  - Use this path for correctness smoke tests, not real inference workloads.
